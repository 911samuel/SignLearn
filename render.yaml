# Render Blueprint — https://render.com/docs/blueprint-spec
# After committing this file, go to render.com → New → Blueprint → point at
# this repo.  Render will read render.yaml and provision the service.
services:
  - type: web
    name: signlearn-api
    runtime: docker
    plan: starter            # $7/mo, no idle sleep.  Required for live demos.
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SIGNLEARN_ASYNC_MODE
        value: gevent
      - key: SIGNLEARN_SECRET_KEY
        generateValue: true   # Render generates and stores a 32-byte secret.
      - key: SIGNLEARN_ADMIN_TOKEN
        sync: false           # Set manually in dashboard — do not commit.
      - key: SIGNLEARN_CORS_ORIGINS
        sync: false           # Set after you know the Vercel URL.
      - key: SIGNLEARN_MODEL_PATH
        value: /app/artifacts/checkpoints/tcn_best.onnx
